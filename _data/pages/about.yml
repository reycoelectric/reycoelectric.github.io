hero:
  headline: "22 Years of Doing It Right"
  subhead: "How a one-truck electrician built the DMV's most trusted commercial electrical team."

founding_story:
  label: "The Founding Story"
  headline: "Dave Reynolds, Founder & President"
  text: |
    Dave Reynolds founded Reyco Electrical Services in 2004 with one truck, one phone, and a commitment to showing
    up when he said he would. Twenty-one years later, Reyco is a 53-person operation serving the most demanding
    commercial and institutional facilities in DC, Maryland, and Virginia.

    From emergency service calls at 2 AM to multi-year institutional projects, Reyco's team handles the electrical
    work that keeps mission-critical facilities running. Our safety record — EMR 0.81, top 10% nationally — means
    we're trusted in environments where other contractors can't even get through the door.

    Dave still runs the company day-to-day. He knows every tech by name, is personally involved in hiring, and is
    focused on building a company where people can grow their careers — not just collect a paycheck.
  caption: "Dave Reynolds, Founder & President"

how_we_operate:
  label: "What We Stand For"
  headline: "How We Operate"

how_we_work:
  label: "How We Work"
  headline: "Modern Systems, Real Accountability"
  text1: |
    We use BuildOps to dispatch, track, and invoice every service call. Our techs carry tablets with real-time
    job details, customer information, and the ability to capture photos, collect signatures, and generate
    invoices on-site.
  text2: |
    That means you get a digital invoice the same day we're on-site — not 45 days later. And our account managers
    can see the status of every call in real time, so there's no phone tag and no surprises.
  text3: |
    Larger projects are estimated through AccuBid and all costs sync to QuickBooks. We run tight, documented
    processes — our folder structures, job workflows, and dispatch systems have been refined over 10+ years.

the_team:
  label: "The Team"
  headline: "53 People, One Standard"

hq:
  label: "Our Home Base"
  headline: "New 10,000 sq ft HQ in Hughesville, MD"
  text1: |
    In 2024, Reyco moved into a new 10,000 sq ft headquarters in
    Hughesville, MD. The facility consolidates our prior locations into a single hub — with yard space, truck
    parking, and warehouse capacity to support our growing fleet and team.
  text2: |
    Positioned in Southern Maryland, we're centrally located to serve DC,
    the Maryland suburbs, and Northern Virginia from a single dispatch point.

