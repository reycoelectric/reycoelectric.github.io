hero:
  headline: "Build a Career,<br>Not Just a Job"
  subhead: "Whether you're a Helper looking to start in the trades, a licensed journeyman who wants better pay and variety, or a project manager who wants to run real projects on professional systems — we're hiring across the board."
  cta1: { label: "See Open Positions", url: "/careers/#openings" }
  cta2: { label: "Why Reyco? →", url: "/careers/why-reyco/" }

tracks_overview:
  label: "Your Path"
  headline: "Two Tracks. One Team."
  subhead: "We offer 100% employer-paid health and dental, a 401(k) with 7% company contribution, paid training, and the kind of work that keeps things interesting. The details differ by role — that's why we've built two career paths."
  field:
    label: "Field Careers"
    headline: "Build a Career with Your Hands"
    text: "For electricians, apprentices, helpers, and anyone looking to get into the trades. A clear ladder through Mechanic, then two senior field paths (Service Tech or Foreman) at the same level, paid apprenticeship, and the variety of working on emergency calls, panel upgrades, and institutional projects — not the same outlet box every day."
    cta: { label: "Explore Field Careers →", url: "/careers/field/" }
  office:
    label: "Office & Professional"
    headline: "Build the Business, Not Just Buildings"
    text: "For project managers, estimators, account managers, and operations professionals. Real systems (BuildOps, AccuBid, QuickBooks), a a strong project pipeline, and the chance to build something at a company that's scaling — not just maintaining."
    cta: { label: "Explore Office Careers →", url: "/careers/office/" }

benefits_snapshot:
