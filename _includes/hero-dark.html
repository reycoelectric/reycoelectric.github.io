<!-- Usage: {% include hero-dark.html headline="..." subhead="..." %} -->
<section class="bg-stone-800 px-6 md:px-16 py-14 md:py-20">
  <div class="max-w-4xl">
    {% if include.eyebrow %}
    <div class="text-teal-400 text-xs font-bold uppercase tracking-widest mb-3">{{ include.eyebrow }}</div>
    {% endif %}
    <h1 class="text-white text-3xl md:text-4xl font-extrabold tracking-tight leading-tight mb-3">{{ include.headline }}</h1>
    {% if include.subhead %}
    <p class="text-stone-400 text-base md:text-lg max-w-2xl">{{ include.subhead }}</p>
    {% endif %}
    {% if include.cta_label %}
    <div class="mt-7">
      <a href="{{ include.cta_url | default: '/contact/' | relative_url }}" class="btn-teal">{{ include.cta_label }}</a>
    </div>
    {% endif %}
  </div>
</section>
