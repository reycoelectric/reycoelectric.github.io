<section class="bg-stone-800 py-10 px-6 md:px-16">
  <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-6 text-center">
    {% for stat in site.data.stats %}
    <div>
      <div class="text-white text-3xl font-extrabold tracking-tight">
        {% if stat.key == "founded" %}
          {{ site.time | date: "%Y" | minus: 2004 }}
        {% elsif stat.key %}
          {{ site[stat.key] }}
        {% else %}
          {{ stat.number }}
        {% endif %}
      </div>
      <div class="text-stone-400 text-xs uppercase tracking-widest mt-1">{{ stat.label }}</div>
    </div>
    {% endfor %}
  </div>
</section>
